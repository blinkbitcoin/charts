cert-manager:
  enabled: false
kubemonkey:
  enabled: false
opentelemetry-collector:
  enabled: false
strimzi-kafka-operator:
  enabled: false
ingress-nginx:
  controller:
    allowSnippetAnnotations: true
    admissionWebhooks:
      enabled: false
    config:
      otlp-collector-host: opentelemetry-collector.galoy-dev-otel.svc.cluster.local
      otel-service-name: galoy-dev-ingress
    service:
      type: NodePort
