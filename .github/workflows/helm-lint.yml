name: Helm Lint and Test
on:
  pull_request:
    branches: [main]
    paths:
      - 'charts/**'

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Get changed charts
        id: changed-charts
        run: |
          changed=$(git diff --name-only origin/main...HEAD -- charts/ | cut -d'/' -f1-2 | sort -u)
          echo "charts<<EOF" >> $GITHUB_OUTPUT
          echo "$changed" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Add Helm repositories
        run: |
          repos=""
          for chart in ${{ steps.changed-charts.outputs.charts }}; do
            if [ -f "$chart/Chart.yaml" ]; then
              repos="$repos $(grep 'repository:' "$chart/Chart.yaml" | awk '{print $2}' | tr -d '"' | grep '^https://')"
            fi
          done
          i=0
          for repo in $(echo "$repos" | tr ' ' '\n' | sort -u); do
            helm repo add "repo-$i" "$repo"
            i=$((i + 1))
          done
          if [ "$i" -gt 0 ]; then
            helm repo update
          fi

      - name: Lint changed charts
        run: |
          for chart in ${{ steps.changed-charts.outputs.charts }}; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "Linting $chart..."
              helm dependency build "$chart"
              helm lint "$chart"
            fi
          done

      - name: Test template rendering
        run: |
          for chart in ${{ steps.changed-charts.outputs.charts }}; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "Testing template for $chart..."
              helm template test "$chart"
            fi
          done

