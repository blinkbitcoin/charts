{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "blink-terminal.fullname" . }}
  labels:
    app: {{ template "blink-terminal.fullname" . }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: "{{ .Release.Name }}"
type: Opaque
data:
  database-url: {{ .Values.secrets.databaseUrl | b64enc | quote }}
  redis-password: {{ .Values.secrets.redisPassword | b64enc | quote }}
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  encryption-key: {{ .Values.secrets.encryptionKey | b64enc | quote }}
  network-encryption-key: {{ .Values.secrets.networkEncryptionKey | b64enc | quote }}
  blinkpos-api-key: {{ .Values.secrets.blinkposApiKey | b64enc | quote }}
  blinkpos-btc-wallet-id: {{ .Values.secrets.blinkposBtcWalletId | b64enc | quote }}
  blink-webhook-secret: {{ .Values.secrets.blinkWebhookSecret | b64enc | quote }}
  citrusrate-api-key: {{ .Values.secrets.citrusrateApiKey | b64enc | quote }}
  citrusrate-base-url: {{ .Values.secrets.citrusrateBaseUrl | b64enc | quote }}
{{- end }}
