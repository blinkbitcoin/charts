apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "blink-lnurl-server.fullname" . }}
  labels:
    app: {{ template "blink-lnurl-server.fullname" . }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: "{{ .Release.Name }}"
    kube-monkey/identifier: {{ template "blink-lnurl-server.fullname" . }}
    kube-monkey/enabled: enabled
    kube-monkey/kill-mode: fixed
    kube-monkey/kill-value: "1"
    kube-monkey/mtbf: "3"
spec:
  selector:
    matchLabels:
      app: {{ template "blink-lnurl-server.fullname" . }}
      release: {{ .Release.Name }}
  replicas: 1
  template:
    metadata:
      labels:
        app: {{ template "blink-lnurl-server.fullname" . }}
        release: "{{ .Release.Name }}"
        kube-monkey/identifier: {{ template "blink-lnurl-server.fullname" . }}
        kube-monkey/enabled: enabled
{{- with .Values.labels }}
{{ toYaml . | trim | indent 8 }}
{{- end }}
    spec:
{{- if .Values.waitForInternalJwks.enabled }}
{{- $jwksUrl := required "blinkLnurlServer.internalJwksUrl is required when waitForInternalJwks.enabled=true" .Values.blinkLnurlServer.internalJwksUrl }}
      initContainers:
      - name: wait-for-internal-jwks
        image: {{ .Values.waitForInternalJwks.image | quote }}
        imagePullPolicy: {{ .Values.waitForInternalJwks.pullPolicy | quote }}
        command: ["sh", "-ec"]
        args:
        - |
          end=$(( $(date +%s) + {{ .Values.waitForInternalJwks.timeoutSeconds }} ))
          until curl -fsS {{ $jwksUrl | quote }} >/dev/null; do
            if [ "$(date +%s)" -ge "$end" ]; then
              echo "timed out waiting for internal JWKS endpoint" >&2
              exit 1
            fi
            sleep {{ .Values.waitForInternalJwks.intervalSeconds }}
          done
{{- end }}
      containers:
      - name: blink-lnurl-server
        image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
        ports:
        - containerPort: {{ .Values.service.port }}
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.service.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.service.port }}
          initialDelaySeconds: 15
          periodSeconds: 30
        env:
        - name: LNURL_ADDRESS
          value: {{ .Values.blinkLnurlServer.address | quote }}
        - name: LNURL_AUTO_MIGRATE
          value: {{ .Values.blinkLnurlServer.autoMigrate | quote }}
        - name: DEPLOYMENT_ENV
          value: {{ .Values.blinkLnurlServer.deploymentEnv | quote }}
        - name: LNURL_SPARK_ENABLED
          value: {{ .Values.blinkLnurlServer.sparkEnabled | quote }}
        - name: LNURL_BLINK_ENABLED
          value: {{ .Values.blinkLnurlServer.blinkEnabled | quote }}
        - name: LNURL_DOMAINS
          value: {{ .Values.blinkLnurlServer.domains | quote }}
{{- $sparkNetwork := .Values.blinkLnurlServer.sparkNetwork | default .Values.blinkLnurlServer.network }}
{{- if $sparkNetwork }}
        - name: LNURL_SPARK_NETWORK
          value: {{ $sparkNetwork | quote }}
{{- end }}
{{- if .Values.blinkLnurlServer.blinkGraphqlEndpoint }}
        - name: LNURL_BLINK_GRAPHQL_ENDPOINT
          value: {{ .Values.blinkLnurlServer.blinkGraphqlEndpoint | quote }}
{{- end }}
        - name: LNURL_SCHEME
          value: {{ .Values.blinkLnurlServer.scheme | quote }}
        - name: LNURL_WEBHOOK_DOMAIN
          value: {{ include "blink-lnurl-server.webhookDomain" . | quote }}
        - name: LNURL_LOG_LEVEL
          value: {{ .Values.blinkLnurlServer.logLevel | quote }}
        - name: LNURL_MIN_SENDABLE
          value: {{ .Values.blinkLnurlServer.minSendable | quote }}
        - name: LNURL_MAX_SENDABLE
          value: {{ .Values.blinkLnurlServer.maxSendable | quote }}
        - name: LNURL_WEBHOOK_DELIVERY_TTL_DAYS
          value: {{ .Values.blinkLnurlServer.webhookDeliveryTtlDays | quote }}
{{- if .Values.blinkLnurlServer.crlUrl }}
        - name: LNURL_CRL_URL
          value: {{ .Values.blinkLnurlServer.crlUrl | quote }}
{{- end }}
{{- if .Values.blinkLnurlServer.internalJwksUrl }}
        - name: LNURL_INTERNAL_JWKS_URL
          value: {{ .Values.blinkLnurlServer.internalJwksUrl | quote }}
{{- end }}
{{- if .Values.blinkLnurlServer.internalJwksPath }}
        - name: LNURL_INTERNAL_JWKS_PATH
          value: {{ .Values.blinkLnurlServer.internalJwksPath | quote }}
{{- end }}
{{- if .Values.blinkLnurlServer.internalJwtIssuer }}
        - name: LNURL_INTERNAL_JWT_ISSUER
          value: {{ .Values.blinkLnurlServer.internalJwtIssuer | quote }}
{{- end }}
{{- if .Values.blinkLnurlServer.internalJwtAudience }}
        - name: LNURL_INTERNAL_JWT_AUDIENCE
          value: {{ .Values.blinkLnurlServer.internalJwtAudience | quote }}
{{- end }}
        - name: LNURL_DB_URL
          valueFrom:
            secretKeyRef:
              name: {{ template "blink-lnurl-server.fullname" . }}
              key: "db-url"
        - name: LNURL_SSP_AUTH_SEED
          valueFrom:
            secretKeyRef:
              name: {{ template "blink-lnurl-server.fullname" . }}
              key: "ssp-auth-seed"
        - name: LNURL_NSEC
          valueFrom:
            secretKeyRef:
              name: {{ template "blink-lnurl-server.fullname" . }}
              key: "nsec"
              optional: true
        - name: LNURL_CA_CERT
          valueFrom:
            secretKeyRef:
              name: {{ template "blink-lnurl-server.fullname" . }}
              key: "ca-cert"
              optional: true
        resources:
          {{ toYaml .Values.resources | nindent 10 }}
